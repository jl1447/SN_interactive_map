<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Squamish Nation Territory Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <div id="container" style="display: flex; height: 100vh; width: 100vw; position: relative;">
        
        <!-- The Side Panel (Always visible, styles handled by styles.css) -->
        <div id="sidebar-panel">
            <button id="close-sidebar" onclick="window.clearSidebar()">✕</button>
            <div id="sidebar-content"></div>
        </div>

        <!-- Your Map -->
        <div id="map" style="flex: 1; height: 100%;"></div>
        
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script type="module" src="./main.js"></script>

</body>
</html>
